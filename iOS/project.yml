name: Termcheck
options:
  bundleIdPrefix: com.shimondeitel.termcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Termcheck:
    type: application
    platform: iOS
    sources:
      - path: Termcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.termcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Termcheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TermcheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TermcheckTests
      - path: Termcheck.storekit
    dependencies:
      - target: Termcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.termcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TermcheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TermcheckUITests
    dependencies:
      - target: Termcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.termcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Termcheck:
    build:
      targets:
        Termcheck: all
        TermcheckTests: [test]
        TermcheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Termcheck.storekit
    test:
      config: Debug
      storeKitConfiguration: Termcheck.storekit
      targets:
        - TermcheckTests
        - TermcheckUITests
    archive:
      config: Release
